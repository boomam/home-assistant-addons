name: Newt
version: 1.12.3
slug: "newt"
description: "Newt client for Home Assistant, for Pangolin connectivity"
url: https://github.com/boomam/home-assistant-addons
icon: "icon.png"
arch:
  - amd64
  - aarch64
startup: services
boot: auto
host_network: true
full_access: true
apparmor: false
privileged:
  - NET_ADMIN
  - NET_RAW
options:
  PANGOLIN_ENDPOINT: "https://pangolin.example.com"
  NEWT_ID: "your_newt_id"
  NEWT_SECRET: "your_newt_secret"
  custom_env_vars: []
schema:
  PANGOLIN_ENDPOINT: "str"
  NEWT_ID: "str"
  NEWT_SECRET: "str"
  custom_env_vars:
    - "match(^[A-Z_][A-Z0-9_]*=.+$)"
map:
  - config:rw
hassio_api: true
homeassistant_api: false
auth_api: false
hassio_role: "default"
