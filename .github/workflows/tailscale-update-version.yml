name: Update Tailscale Version

on:
  schedule:
    - cron: "0 4 * * 3"   # run every Wednesday
  workflow_dispatch:

jobs:
  update-tailscale-version:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Get latest Tailscale release
        id: tailscale
        run: |
          # Fetch the stable release JSON and extract the version from the amd64 tarball filename
          tarball=$(curl -s "https://pkgs.tailscale.com/stable/?mode=json" | jq -r '.Tarballs.amd64')
          latest=$(echo "$tarball" | cut -d_ -f2)
          echo "latest=$latest" >> $GITHUB_OUTPUT

      - name: Get current version
        id: current
        run: |
          current=$(grep "TAILSCALE_VERSION:" tailscale/build.yaml | awk '{print $2}')
          echo "current=$current" >> $GITHUB_OUTPUT

      - name: Check if update is needed
        id: check
        run: |
          if [ "${{ steps.tailscale.outputs.latest }}" = "${{ steps.current.outputs.current }}" ]; then
            echo "update=false" >> $GITHUB_OUTPUT
          else
            echo "update=true" >> $GITHUB_OUTPUT
          fi

      - name: Update build.yaml
        if: steps.check.outputs.update == 'true'
        run: |
          # Using [[:space:]]* makes this resilient to indentation changes
          sed -i "s/^[[:space:]]*TAILSCALE_VERSION:.*/  TAILSCALE_VERSION: ${{ steps.tailscale.outputs.latest }}/" tailscale/build.yaml
          
      - name: Update CHANGELOG.md
        if: steps.check.outputs.update == 'true'
        run: |
          old_version=${{ steps.current.outputs.current }}
          new_version=${{ steps.tailscale.outputs.latest }}
          echo "Updating changelog from $old_version to $new_version"
          # Note: This still relies on line 11 being the correct insertion point
          sed -i "11a ## Tailscale $new_version\n* Updated Tailscale from $old_version to $new_version\n" tailscale/CHANGELOG.md

      - name: Update config.yaml
        if: steps.check.outputs.update == 'true'
        run: |
          new_version=${{ steps.tailscale.outputs.latest }}
          # Searching for the exact key rather than hardcoding line 3
          sed -i "s/^version:.*/version: $new_version/" tailscale/config.yaml

      - name: Commit changes
        if: steps.check.outputs.update == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tailscale/build.yaml tailscale/CHANGELOG.md tailscale/config.yaml
          git commit -m "Update Tailscale to ${{ steps.tailscale.outputs.latest }}"
          git push

      - name: No update needed
        if: steps.check.outputs.update == 'false'
        run: echo "✅ Tailscale is already up to date (version ${{ steps.current.outputs.current }})"
